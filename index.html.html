            { q: "একটি ম্যাট্রিক্সের ট্রেস হলো-", a: "নির্ণায়ক", b: "মুখ্য কর্ণের যোগফল", c: "বিপরীত ম্যাট্রিক্স", d: "র‍্যাঙ্ক", ans: "b", exp: "বর্গ ম্যাট্রিক্সের প্রধান কর্ণের উপাদানগুলোর সমষ্টিই ট্রেস।" },
            { q: "nCr + nCr-1 = ?", a: "n+1Cr", b: "nCr+1", c: "n+1Cr-1", d: "nCr", ans: "a", exp: "এটি সমাবেশের একটি গুরুত্বপূর্ণ বৈশিষ্ট্য বা উপপাদ্য।" },
            { q: "tan 45° এর মান কত?", a: "0", b: "1/2", c: "1", d: "√3", ans: "c", exp: "Trigonometric table অনুযায়ী tan 45 = 1।" },
            { q: "∫ 1/x dx = ?", a: "ln|x| + c", b: "x² + c", c: "1 + c", d: "e^x + c", ans: "a", exp: "1/x এর ইন্টিগ্রেশন হলো ন্যাচারাল লগ x।" }
        ];

        function loadQuestions() {
            const wrapper = document.getElementById('questions-wrapper');
            mcqData.forEach((item, index) => {
                const html = `
                    <div class="q-block" id="q-block-${index}">
                        <span class="q-text">${index + 1}. ${item.q}</span>
                        <div class="options">
                            <label class="option"><input type="radio" name="q${index}" value="a"> A. ${item.a}</label>
                            <label class="option"><input type="radio" name="q${index}" value="b"> B. ${item.b}</label>
                            <label class="option"><input type="radio" name="q${index}" value="c"> C. ${item.c}</label>
                            <label class="option"><input type="radio" name="q${index}" value="d"> D. ${item.d}</label>
                        </div>
                    </div>
                `;
                wrapper.innerHTML += html;
            });
        }

        let timeLeft = 1800; // 30 minutes
        let timer;

        function startExam() {
            const pass = document.getElementById('passInput').value;
            if (pass === "abdullahzeroun") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('exam-container').style.display = 'block';
                loadQuestions();
                startTimer();
            } else {
                document.getElementById('err').style.display = 'block';
            }
        }

        function startTimer() {
            timer = setInterval(() => {
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    processResult();
                }
                timeLeft--;
            }, 1000);
        }

        function processResult() {
            clearInterval(timer);
            let score = 0;
            const reviewList = document.getElementById('review-list');
            reviewList.innerHTML = "<h3>Review & Explanations:</h3>";

            mcqData.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                const userVal = selected ? selected.value : null;
                const isCorrect = userVal === item.ans;
                if (isCorrect) score++;

                reviewList.innerHTML += `
                    <div class="review-card ${isCorrect ? 'correct-card' : 'wrong-card'}">
                        <strong>Q${index+1}: ${item.q}</strong><br>
                        <span>Your Answer: <b style="color:${isCorrect ? 'green' : 'red'}">${userVal ? userVal.toUpperCase() : 'Not Attempted'}</b></span> | 
                        <span>Correct: <b style="color:green">${item.ans.toUpperCase()}</b></span>
                        <div class="explanation"><b>ব্যাখ্যা:</b> ${item.exp}</div>
                    </div>
                `;
            });

            document.getElementById('quizForm').style.display = 'none';
            document.getElementById('timer').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('score-display').innerText = `${score} / 40`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
